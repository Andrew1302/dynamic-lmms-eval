# =============================================================================
# jobs/example.conf — Boilerplate template. Copy to jobs/<your_job>.conf.
# =============================================================================
# A job config is sourced by bash; it must set:
#
#   JOB_NAME              (optional) — defaults to the .conf filename
#   UPLOAD_PATHS          (array)    — paths relative to LOCAL_REPO_ROOT rsynced to REMOTE_WORKDIR
#   DATASET_UPLOAD_PATHS  (optional) — paths relative to LOCAL_DATASET_ROOT rsynced to REMOTE_DATASET_DIR;
#                                      only needed for jobs that call tools/prepare_dynamic_graph_*.py
#   REMOTE_SETUP_CMD      (optional) — ran once on deploy, streamed (no tmux)
#   REMOTE_RUN_CMD        (required) — launched inside tmux; stdout/stderr tee'd to run.log.
#                                      The launcher cds into REMOTE_WORKDIR and sources .venv first.
#   RESULT_PATHS          (array)    — paths relative to REMOTE_WORKDIR to rsync back
#
# All paths are relative so the VM's REMOTE_WORKDIR / REMOTE_DATASET_DIR
# (set in config.sh) stay the single source of truth for the remote layout.
# =============================================================================

JOB_NAME="example"

UPLOAD_PATHS=(
    "README.md"
)

REMOTE_SETUP_CMD="echo 'no setup needed'"

REMOTE_RUN_CMD="cd '$REMOTE_WORKDIR' && for i in 1 2 3 4 5; do echo \"tick \$i\"; sleep 2; done && echo DONE"

RESULT_PATHS=(
    # ".runs/example/run.log"   # the log is always fetched automatically
)
