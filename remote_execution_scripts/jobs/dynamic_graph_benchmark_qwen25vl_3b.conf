# =============================================================================
# jobs/dynamic_graph_benchmark_qwen25vl_3b.conf
# -----------------------------------------------------------------------------
# Generates the Dynamic Graph Benchmark dataset from the sibling dynamic-dataset
# repo (must exist at ../dynamic-dataset on the VM) and runs lmms-eval with
# Qwen2.5-VL-3B-Instruct against all four direct/disguise leaf tasks.
# =============================================================================

JOB_NAME="dynamic_graph_benchmark_qwen25vl_3b"

# Sync the files lmms-eval needs (avoids shipping .venv, results, etc.).
UPLOAD_PATHS=(
    "lmms_eval"
    "tools"
    "examples/models/dynamic_graph_benchmark"
    "pyproject.toml"
    "uv.lock"
    "setup.py"
    "README.md"
)

# Sibling dynamic-dataset repo: only the pieces needed by
# tools/prepare_dynamic_graph_benchmark.py. Excludes .venv, out/, PDFs, caches.
DATASET_UPLOAD_PATHS=(
    "src"
    "pyproject.toml"
    "uv.lock"
)

# uv sync is idempotent; safe to re-run on every deploy. 01_deploy.sh cds into
# REMOTE_WORKDIR and activates .venv before running this, so `uv` resolves.
REMOTE_SETUP_CMD="uv sync"

# 02_run.sh's launcher cds into REMOTE_WORKDIR and activates .venv before
# invoking this command, so no `cd` or env setup needed here.
REMOTE_RUN_CMD="bash examples/models/dynamic_graph_benchmark/qwen25vl_3b.sh 100 medium"

# Rsync these paths back after the run completes.
RESULT_PATHS=(
    "logs/dynamic_graph_benchmark_qwen25vl_3b"
    "dynamic_graph_benchmark_data"
    "dynamic_graph_benchmark_images"
)
